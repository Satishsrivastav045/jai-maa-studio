<!DOCTYPE html>
<html>
<head>
  <title>Security Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    form {
      width: min(360px, calc(100% - 32px));
      padding: 24px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
    }

    input,
    button {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      font: inherit;
    }

    button {
      border: 0;
      background: gold;
      color: #080808;
      font-weight: bold;
      cursor: pointer;
    }

    p {
      color: #ffb3b3;
    }
  </style>
</head>
<body>
  <form method="post">
    {% csrf_token %}
    <h1>Security Code</h1>
    {% if error %}<p>{{ error }}</p>{% endif %}
    <input type="hidden" name="next" value="{{ next_url }}">
    <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter admin code" required autofocus>
    <button type="submit">Continue</button>
  </form>
</body>
</html>
