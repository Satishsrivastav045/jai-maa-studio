<!DOCTYPE html>
<html>
<head>
  <title>Booking Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0a0a0a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 200px;
    }

    .card h2 {
      color: gold;
    }

    .status-select {
      min-width: 130px;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #0a0a0a;
      color: white;
    }

    .status-pill {
      display: inline-block;
      min-width: 88px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 215, 0, 0.16);
      color: gold;
      font-size: 12px;
      font-weight: bold;
    }

    #saveStatus {
      min-height: 22px;
      text-align: center;
      color: #bbb;
      font-size: 14px;
    }

    canvas {
      background: #111;
      padding: 10px;
      border-radius: 10px;
      display: block;
      margin: auto;
    }

    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
      background: #111;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    th {
      background: gold;
      color: black;
    }
  </style>
</head>

<body>

<h1>📊 Booking Dashboard</h1>

<div class="stats">
  <div class="card">
    <h2>{{ total }}</h2>
    <p>Total</p>
  </div>

  <div class="card">
    <h2>{{ today }}</h2>
    <p>Today</p>
  </div>
</div>

<h2 style="text-align:center;">📊 Booking Analytics</h2>

<canvas id="bookingChart" width="400" height="200"></canvas>

<p id="saveStatus" aria-live="polite"></p>

<table>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Event</th>
    <th>Event date</th>
    <th>Status</th>

    <th>Created</th>
  </tr>

  {% for b in bookings %}
  <tr>
    <td>{{ b.id }}</td>
    <td>{{ b.name }}</td>
    <td>{{ b.phone }}</td>
    <td>{{ b.event }}</td>
    <td>{{ b.event_date }}</td>
    <td>
      <select class="status-select" data-booking-id="{{ b.id }}" onchange="updateStatus(this)">
        {% for value, label in status_choices %}
          <option value="{{ value }}" {% if b.status == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </td>
    <td>{{ b.created_at }}</td>
  </tr>
  {% endfor %}
</table>

<script>
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

async function updateStatus(select) {
  const statusText = document.getElementById("saveStatus");
  const bookingId = select.dataset.bookingId;
  const previousValue = select.dataset.previousValue || select.value;
  select.disabled = true;
  statusText.textContent = "Saving booking status...";

  try {
    const response = await fetch(`/dashboard/bookings/${bookingId}/status/`, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
        "X-CSRFToken": getCookie("csrftoken")
      },
      body: new URLSearchParams({ status: select.value })
    });

    if (!response.ok) {
      throw new Error("Status update failed");
    }

    const data = await response.json();
    select.dataset.previousValue = data.booking_status;
    statusText.textContent = `Booking #${bookingId} marked ${data.booking_status_label}.`;
  } catch (error) {
    select.value = previousValue;
    statusText.textContent = "Status save nahi hua. Please try again.";
  } finally {
    select.disabled = false;
  }
}

document.querySelectorAll(".status-select").forEach((select) => {
  select.dataset.previousValue = select.value;
});

const labels = JSON.parse('{{ labels|escapejs }}');
const counts = JSON.parse('{{ counts|escapejs }}');

console.log(labels, counts); // debug

const ctx = document.getElementById('bookingChart');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      label: 'Bookings',
      data: counts,
      backgroundColor: 'gold'
    }]
  }
});
</script>

</body>
</html>
